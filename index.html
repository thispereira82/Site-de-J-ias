<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Verdeleve - Jóias Sustentáveis</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #f6f4f1;
    color: #2e2e2e;
}

/* HEADER */
header {
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 25px 10px;
    background: #2f3e34;
}

.logo {
    width: 400px;
}

@media (max-width: 600px) {
    .logo {
        width: 160px;
    }
}

/* ABAS */
.tabs {
    display: flex;
    gap: 10px;
    padding: 10px;
    overflow-x: auto;
    background: #ffffff;
    flex-wrap: wrap;
    justify-content: center;
}

.tabs::-webkit-scrollbar {
    display: none;
}

.tab-btn {
    flex: 0 0 auto;
    padding: 10px 20px;
    border: none;
    background: #eaeaea;
    cursor: pointer;
    border-radius: 25px;
    font-size: 16px;
    font-weight: bold;
    transition: all 0.3s;
}

.tab-btn:hover {
    background: #cbd8d0;
}

.tab-btn.active {
    background: #2f3e34;
    color: #fff;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 15px;
    padding: 15px;
}

@media (max-width: 600px) {
    .products {
        grid-template-columns: 1fr;
    }
}

/* CARD */
.card {
    border-radius: 12px;
    overflow: hidden;
    background: #fff;
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    position: relative;
    transition: all 0.3s;
}

/* CARD VENDIDO - estilo especial */
.card.vendido-card {
    opacity: 0.75;
    background: #f0f0f0;
}

.card.vendido-card .info {
    background: #f9f9f9;
}

.card.vendido-card .btn-vender {
    background: #6c757d;
    cursor: not-allowed;
}

/* NUMERO */
.card::after {
    content: attr(data-numero);
    position: absolute;
    bottom: 10px;
    left: 10px;
    background: #2f3e34;
    color: #fff;
    font-size: 16px;
    font-weight: bold;
    padding: 6px 12px;
    border-radius: 20px;
    z-index: 1;
}

/* IMAGEM */
.card img {
    width: 100%;
    height: 35vw;
    max-height: 380px;
    min-height: 180px;
    object-fit: contain;
    padding: 10px;
    cursor: zoom-in;
    transition: transform 0.3s ease;
}

.card:hover img {
    transform: scale(1.05);
}

/* OVERLAY */
.overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.3);
    display: flex;
    justify-content: center;
    align-items: center;
    color: #fff;
    font-size: 13px;
    opacity: 0;
    transition: 0.3s;
    pointer-events: none;
}

.card:hover .overlay {
    opacity: 1;
}

/* INFO */
.info {
    padding: 12px;
    text-align: center;
}

.price {
    font-weight: bold;
    color: #3e5c4d;
    font-size: 18px;
}

.product-name {
    font-weight: 500;
    margin: 5px 0;
}

/* BOTÕES */
.btn-group {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-top: 10px;
}

.btn {
    display: inline-block;
    padding: 8px 14px;
    background: #2f3e34;
    color: #fff;
    text-decoration: none;
    border-radius: 6px;
    font-size: 13px;
    cursor: pointer;
    border: none;
    font-family: inherit;
    transition: all 0.2s;
}

.btn:hover {
    opacity: 0.85;
    transform: scale(1.02);
}

.btn-whats {
    background: #25d366;
}

.btn-whats:hover {
    background: #1da15a;
}

.btn-vender {
    background: #dc3545;
}

.btn-vender:hover {
    background: #c82333;
}

.btn-restaurar {
    background: #ffc107;
    color: #333;
}

.btn-restaurar:hover {
    background: #e0a800;
}

/* STATUS */
.status {
    display: inline-block;
    padding: 4px 10px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: bold;
    margin-bottom: 8px;
}

.disponivel { background: #d4edda; color: #155724; }
.reservado { background: #fff3cd; color: #856404; }
.vendido { background: #6c757d; color: white; }

/* ZOOM */
#zoom {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    justify-content: center;
    align-items: center;
    z-index: 999;
}

#zoom img {
    max-width: 90%;
    max-height: 90%;
    border-radius: 10px;
    background: white;
}

/* RODAPÉ */
footer {
    text-align: center;
    padding: 15px;
    font-size: 13px;
    color: #666;
}

/* Aba vendidas - contador */
.vendidas-badge {
    background: #dc3545;
    color: white;
    border-radius: 50%;
    padding: 2px 8px;
    font-size: 12px;
    margin-left: 5px;
}
</style>
</head>

<body>

<header>
    <img src="logo.png" class="logo" alt="Verdeleve Logo">
</header>

<div class="tabs">
    <button class="tab-btn active" onclick="filtrar('disponiveis', event)">✨ Disponíveis</button>
    <button class="tab-btn" onclick="filtrar('vendidas', event)">💔 Vendidas</button>
    <button class="tab-btn" onclick="filtrar('brinco', event)">Brincos</button>
    <button class="tab-btn" onclick="filtrar('colar', event)">Colares</button>
    <button class="tab-btn" onclick="filtrar('bracelete', event)">Braceletes</button>
</div>

<section class="products" id="products-container">
    <!-- Os cards serão gerados pelo JavaScript para facilitar a gestão -->
</section>

<footer>
📲 WhatsApp: (11) 96342-9803
</footer>

<div id="zoom" onclick="fecharZoom()">
    <img id="img-zoom">
</div>

<script>
// ==================== DADOS DAS JÓIAS ====================
const joias = [
    { id: 1, numero: "1", categoria: "colar", nome: "Colar marchetaria de Madeira", preco: 50, status: "disponivel", img: "joia1.jpeg" },
    { id: 2, numero: "2", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "reservado", img: "joia2.jpeg" },
    { id: 3, numero: "3", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "reservado", img: "joia3.jpeg" },
    { id: 4, numero: "4", categoria: "colar", nome: "Colar de Madeira", preco: 55, status: "disponivel", img: "joia4.jpeg" },
    { id: 5, numero: "5", categoria: "colar", nome: "Colar de Madeira", preco: 50, status: "disponivel", img: "joia5.jpeg" },
    { id: 6, numero: "6", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "disponivel", img: "joia6.jpeg" },
    { id: 7, numero: "7", categoria: "brinco", nome: "Brinco de Madeira", preco: 50, status: "reservado", img: "joia7.jpeg" },
    { id: 8, numero: "8", categoria: "colar", nome: "Colar de Madeira", preco: 45, status: "disponivel", img: "joia8.jpeg" },
    { id: 9, numero: "10", categoria: "bracelete", nome: "Bracelete de Madeira", preco: 55, status: "reservado", img: "joia10.jpg" },
    { id: 10, numero: "11", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "disponivel", img: "joia11.jpg" },
    { id: 11, numero: "13", categoria: "colar", nome: "Colar de Madeira", preco: 40, status: "reservado", img: "joia13.jpg" },
    { id: 12, numero: "14", categoria: "colar", nome: "Colar de Madeira", preco: 35, status: "disponivel", img: "joia14.jpg" },
    { id: 13, numero: "15", categoria: "colar", nome: "Colar de Madeira", preco: 50, status: "disponivel", img: "joia15.jpeg" },
    { id: 14, numero: "16", categoria: "brinco", nome: "Brinco de Madeira", preco: 30, status: "disponivel", img: "joia16.jpeg" },
    { id: 15, numero: "17", categoria: "brinco", nome: "Brinco de Madeira", preco: 30, status: "disponivel", img: "joia17.jpeg" }
];

// Estado atual da visualização
let currentFilter = "disponiveis";

// ==================== FUNÇÕES PRINCIPAIS ====================
function renderizarJoias() {
    const container = document.getElementById('products-container');
    container.innerHTML = '';
    
    let joiasParaMostrar = [];
    
    // Lógica de filtro
    if (currentFilter === 'disponiveis') {
        joiasParaMostrar = joias.filter(j => j.status !== 'vendido');
    } 
    else if (currentFilter === 'vendidas') {
        joiasParaMostrar = joias.filter(j => j.status === 'vendido');
    }
    else if (currentFilter === 'brinco') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'brinco' && j.status !== 'vendido');
    }
    else if (currentFilter === 'colar') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'colar' && j.status !== 'vendido');
    }
    else if (currentFilter === 'bracelete') {
        joiasParaMostrar = joias.filter(j => j.categoria === 'bracelete' && j.status !== 'vendido');
    }
    
    if (joiasParaMostrar.length === 0) {
        container.innerHTML = '<div style="text-align: center; padding: 50px; grid-column: 1/-1;">✨ Nenhuma joia encontrada nesta categoria ✨</div>';
        return;
    }
    
    joiasParaMostrar.forEach(joia => {
        const card = criarCard(joia);
        container.appendChild(card);
    });
}

function criarCard(joia) {
    const card = document.createElement('div');
    card.className = 'card';
    if (joia.status === 'vendido') {
        card.classList.add('vendido-card');
    }
    card.setAttribute('data-numero', joia.numero);
    card.setAttribute('data-id', joia.id);
    card.setAttribute('data-categoria', joia.categoria);
    
    // Status text
    let statusText = '';
    let statusClass = '';
    if (joia.status === 'disponivel') {
        statusText = 'Disponível';
        statusClass = 'disponivel';
    } else if (joia.status === 'reservado') {
        statusText = 'Reservado';
        statusClass = 'reservado';
    } else {
        statusText = 'Vendido';
        statusClass = 'vendido';
    }
    
    // HTML do card
    card.innerHTML = `
        <img src="${joia.img}" onclick="ampliar(this)" onerror="this.src='https://placehold.co/400x400?text=Imagem+não+encontrada'">
        <div class="overlay">🔍 Clique para ampliar</div>
        <div class="info">
            <span class="status ${statusClass}">${statusText}</span>
            <div class="product-name">${joia.nome}</div>
            <div class="price">R$ ${joia.preco}</div>
            <div class="btn-group">
                ${joia.status !== 'vendido' ? `<button class="btn btn-whats" onclick="comprar(this)">💬 WhatsApp</button>` : ''}
                ${joia.status === 'disponivel' ? `<button class="btn btn-vender" onclick="marcarComoVendida(this)">🔨 Marcar vendida</button>` : ''}
                ${joia.status === 'reservado' ? `<button class="btn btn-vender" onclick="marcarComoVendida(this)">✅ Confirmar venda</button>` : ''}
                ${joia.status === 'vendido' ? `<button class="btn btn-restaurar" onclick="restaurarVenda(this)">↩️ Restaurar</button>` : ''}
            </div>
        </div>
    `;
    
    return card;
}

// Função para marcar uma joia como vendida
function marcarComoVendida(botao) {
    const card = botao.closest('.card');
    const id = parseInt(card.getAttribute('data-id'));
    const joia = joias.find(j => j.id === id);
    
    if (joia && joia.status !== 'vendido') {
        const confirmar = confirm(`Confirmar venda da joia nº ${joia.numero} - ${joia.nome}?`);
        if (confirmar) {
            joia.status = 'vendido';
            renderizarJoias(); // Re-renderiza a view atual
            alert(`✅ Joia nº ${joia.numero} marcada como VENDIDA!`);
        }
    }
}

// Função para restaurar uma joia vendida (voltar para disponível)
function restaurarVenda(botao) {
    const card = botao.closest('.card');
    const id = parseInt(card.getAttribute('data-id'));
    const joia = joias.find(j => j.id === id);
    
    if (joia && joia.status === 'vendido') {
        const confirmar = confirm(`Restaurar joia nº ${joia.numero} - ${joia.nome} para disponível?`);
        if (confirmar) {
            joia.status = 'disponivel';
            renderizarJoias();
            alert(`♻️ Joia nº ${joia.numero} restaurada para DISPONÍVEL!`);
        }
    }
}

// Função de filtro principal
function filtrar(filtro, event) {
    currentFilter = filtro;
    
    // Atualizar classe ativa nos botões
    const botoes = document.querySelectorAll('.tab-btn');
    botoes.forEach(btn => btn.classList.remove('active'));
    if (event && event.target) {
        event.target.classList.add('active');
    } else {
        // Fallback: encontrar botão correspondente
        const botaoCorrespondente = Array.from(botoes).find(btn => 
            btn.innerText.includes(filtro === 'disponiveis' ? 'Disponíveis' : 
                                   filtro === 'vendidas' ? 'Vendidas' :
                                   filtro === 'brinco' ? 'Brincos' :
                                   filtro === 'colar' ? 'Colares' : 'Braceletes')
        );
        if (botaoCorrespondente) botaoCorrespondente.classList.add('active');
    }
    
    renderizarJoias();
}

// Funções auxiliares
function ampliar(img) {
    document.getElementById("img-zoom").src = img.src;
    document.getElementById("zoom").style.display = "flex";
}

function fecharZoom() {
    document.getElementById("zoom").style.display = "none";
}

function comprar(botao) {
    const card = botao.closest('.card');
    const numero = card.getAttribute('data-numero');
    const msg = `Olá, tenho interesse na joia número ${numero}`;
    window.open(`https://wa.me/5511963429803?text=${encodeURIComponent(msg)}`);
}

// Inicializar
renderizarJoias();

// Garantir que o primeiro botão fique ativo ao carregar
document.addEventListener('DOMContentLoaded', () => {
    const btnDisponiveis = document.querySelector('.tab-btn');
    if (btnDisponiveis) btnDisponiveis.classList.add('active');
});
</script>

</body>
</html>
